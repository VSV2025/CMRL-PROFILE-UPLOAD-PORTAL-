<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMRL Tender Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* Background */

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background-image:url("{{ url_for('static', filename='cmrl-building.jpg') }}");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    opacity:0.45;
    z-index:-1;
}

/* Form Container */

.container{
    width:700px;
    background:rgba(255,255,255,0.95);
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 25px rgba(0,0,0,0.3);
}

/* Header */

.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}

.logo{
    width:180px;
    height:180px;
    object-fit:contain;
}

.title{
    color:#0056d2;
    font-size:42px;
    font-weight:bold;
}

/* Form */

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:18px;
    font-weight:bold;
    color:#333;
}

input[type="text"],
input[type="email"],
input[type="tel"],
input[type="file"]{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

.submit-btn{
    display:block;
    margin:25px auto 0;
    background:#0056d2;
    color:white;
    border:none;
    padding:12px 40px;
    border-radius:6px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn:hover{
    background:#003c99;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <img
            src="{{ url_for('static', filename='cmrl-logo.png') }}"
            alt="CMRL Logo"
            class="logo">

           <h1 class="title">CMRL Vendor Registration Portal</h1>
 </div>

    <form
        action="/submit"
        method="POST"
        enctype="multipart/form-data">

        <div class="form-group">
            <label>Company Name</label>
            <input
                type="text"
                name="company_name"
                required>
        </div>

        <div class="form-group">
            <label>Company Profile (PDF)</label>
            <input
                type="file"
                name="company_profile"
                accept=".pdf"
                required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input
                type="email"
                name="email"
                required>
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input
                type="tel"
                name="contact_number"
                pattern="[0-9]{10}"
                maxlength="10"
                placeholder="Enter 10 digit mobile number"
                required>
        </div>

        <button type="submit" class="submit-btn">
            Submit
        </button>

    </form>

</div>

</body>
</html>
